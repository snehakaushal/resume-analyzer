<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder — ResumeAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg:#070b14; --bg2:#0d1422; --surface:#111827; --surface2:#1a2235;
            --border:#1e2d45; --border2:#243350;
            --gold:#c9a84c; --gold2:#e8c870; --gold-dim:rgba(201,168,76,0.1);
            --text:#e8edf5; --text2:#94a3b8; --success:#34d399; --danger:#f87171;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(201,168,76,0.025) 1px, transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.025) 1px, transparent 1px); background-size:60px 60px; pointer-events:none; z-index:0; }

        nav { position:sticky;top:0;z-index:100;height:64px;padding:0 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,11,20,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border); }
        .logo { font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;display:flex;align-items:center;gap:10px; }
        .logo-mark { width:30px;height:30px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#070b14;font-weight:900; }
        .nav-btn { background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:7px 16px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px; }
        .nav-btn:hover { border-color:var(--gold);color:var(--gold); }

        .page { position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:28px 40px;display:grid;grid-template-columns:1fr 480px;gap:28px; }

        /* FORM */
        .form-col { display:flex;flex-direction:column;gap:16px; }
        .f-block { background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px; }
        .f-block-title { font-size:.9rem;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;color:var(--text); }
        .f-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
        .f-group { display:flex;flex-direction:column;gap:5px;margin-bottom:12px; }
        label { font-size:.74rem;color:var(--text2);font-weight:500;letter-spacing:.04em; }
        input, textarea {
            background:var(--surface2);border:1px solid var(--border2);border-radius:9px;
            padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;
            outline:none;transition:border-color .2s;width:100%;
        }
        input:focus, textarea:focus { border-color:var(--gold); }
        input::placeholder, textarea::placeholder { color:var(--text2); }
        textarea { resize:vertical;line-height:1.55; }

        .entry-block { background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:12px; }
        .entry-hdr { display:flex;align-items:center;margin-bottom:13px; }
        .entry-lbl { font-size:.75rem;color:var(--text2);font-weight:600; }
        .btn-rm { margin-left:auto;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--danger);padding:4px 11px;border-radius:7px;font-size:.73rem;cursor:pointer;transition:all .2s; }
        .btn-rm:hover { background:rgba(248,113,113,.15); }
        .btn-add-entry { background:rgba(201,168,76,.06);border:1px dashed rgba(201,168,76,.3);color:var(--gold);padding:10px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;width:100%;margin-top:4px; }
        .btn-add-entry:hover { background:rgba(201,168,76,.1); }

        .btn-actions { display:flex;gap:10px; }
        .btn-gold-full { flex:1;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#070b14;border:none;padding:14px;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .3s; }
        .btn-gold-full:hover { transform:translateY(-2px);box-shadow:0 10px 24px rgba(201,168,76,.3); }
        .btn-outline-full { flex:1;background:transparent;border:1px solid var(--border2);color:var(--text2);padding:14px;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:500;cursor:pointer;transition:all .2s; }
        .btn-outline-full:hover { border-color:var(--gold);color:var(--gold); }

        /* PREVIEW */
        .preview-col { position:sticky;top:90px;height:calc(100vh - 110px);display:flex;flex-direction:column;gap:12px; }
        .preview-header { display:flex;align-items:center;justify-content:space-between; }
        .preview-title { font-size:.82rem;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase; }
        .preview-wrap { flex:1;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.6); }
        iframe { width:100%;height:100%;border:none; }

        @media(max-width:1100px) { .page{grid-template-columns:1fr} .preview-col{position:relative;height:600px} }
        @media(max-width:640px) { nav{padding:0 16px} .page{padding:16px} .f-row{grid-template-columns:1fr} }
    </style>
</head>
<body>

<nav>
    <div class="logo"><div class="logo-mark">R</div>ResumeAI</div>
    <div style="display:flex;gap:10px">
        <a href="/" class="nav-btn">← Home</a>
        <a href="/jd-resume" class="nav-btn">🤖 AI from JD</a>
    </div>
</nav>

<div class="page">
    <!-- FORM COLUMN -->
    <div class="form-col">

        <div class="f-block">
            <div class="f-block-title">👤 Personal Information</div>
            <div class="f-row">
                <div class="f-group"><label>Full Name *</label><input type="text" id="f_name" placeholder="Rahul Sharma" oninput="liveUpdate()"></div>
                <div class="f-group"><label>Job Title</label><input type="text" id="f_title" placeholder="Full Stack Developer" oninput="liveUpdate()"></div>
            </div>
            <div class="f-row">
                <div class="f-group"><label>Email</label><input type="email" id="f_email" placeholder="rahul@email.com" oninput="liveUpdate()"></div>
                <div class="f-group"><label>Phone</label><input type="text" id="f_phone" placeholder="+91 98765 43210" oninput="liveUpdate()"></div>
            </div>
            <div class="f-row">
                <div class="f-group"><label>LinkedIn</label><input type="text" id="f_linkedin" placeholder="linkedin.com/in/rahul" oninput="liveUpdate()"></div>
                <div class="f-group"><label>GitHub / Portfolio</label><input type="text" id="f_github" placeholder="github.com/rahul" oninput="liveUpdate()"></div>
            </div>
        </div>

        <div class="f-block">
            <div class="f-block-title">📝 Professional Summary</div>
            <textarea id="f_summary" rows="3" placeholder="Motivated Computer Science student with experience in Python, React, and cloud technologies. Seeking a software engineering role to apply skills in full-stack development…" oninput="liveUpdate()"></textarea>
        </div>

        <div class="f-block">
            <div class="f-block-title">🎓 Education</div>
            <div id="edu-wrap">
                <div class="entry-block">
                    <div class="entry-hdr"><span class="entry-lbl">Education #1</span><button class="btn-rm" onclick="removeBlock(this)">✕ Remove</button></div>
                    <div class="f-row"><div class="f-group"><label>Degree</label><input type="text" class="edu-deg" placeholder="B.Tech Computer Science" oninput="liveUpdate()"></div><div class="f-group"><label>University</label><input type="text" class="edu-uni" placeholder="XYZ University" oninput="liveUpdate()"></div></div>
                    <div class="f-row"><div class="f-group"><label>Year</label><input type="text" class="edu-yr" placeholder="2021 – 2025" oninput="liveUpdate()"></div><div class="f-group"><label>CGPA / Score</label><input type="text" class="edu-gpa" placeholder="8.5 / 10" oninput="liveUpdate()"></div></div>
                </div>
            </div>
            <button class="btn-add-entry" onclick="addEdu()">+ Add Education</button>
        </div>

        <div class="f-block">
            <div class="f-block-title">💼 Experience</div>
            <div id="exp-wrap">
                <div class="entry-block">
                    <div class="entry-hdr"><span class="entry-lbl">Experience #1</span><button class="btn-rm" onclick="removeBlock(this)">✕ Remove</button></div>
                    <div class="f-row"><div class="f-group"><label>Job Title</label><input type="text" class="exp-ttl" placeholder="Software Developer Intern" oninput="liveUpdate()"></div><div class="f-group"><label>Company</label><input type="text" class="exp-co" placeholder="ABC Technologies" oninput="liveUpdate()"></div></div>
                    <div class="f-group"><label>Duration</label><input type="text" class="exp-dur" placeholder="June 2024 – August 2024" oninput="liveUpdate()"></div>
                    <div class="f-group"><label>Key Points (one per line)</label><textarea class="exp-pts" rows="3" placeholder="Developed REST APIs using Python Flask, reducing response time by 40%&#10;Implemented automated testing increasing code coverage by 25%" oninput="liveUpdate()"></textarea></div>
                </div>
            </div>
            <button class="btn-add-entry" onclick="addExp()">+ Add Experience</button>
        </div>

        <div class="f-block">
            <div class="f-block-title">🚀 Projects</div>
            <div id="proj-wrap">
                <div class="entry-block">
                    <div class="entry-hdr"><span class="entry-lbl">Project #1</span><button class="btn-rm" onclick="removeBlock(this)">✕ Remove</button></div>
                    <div class="f-row"><div class="f-group"><label>Project Name</label><input type="text" class="prj-nm" placeholder="AI Resume Analyzer" oninput="liveUpdate()"></div><div class="f-group"><label>Tech Stack</label><input type="text" class="prj-tk" placeholder="Python, Flask, NLP" oninput="liveUpdate()"></div></div>
                    <div class="f-group"><label>Description (one per line)</label><textarea class="prj-ds" rows="2" placeholder="Built AI-powered resume analysis tool with 90% ATS accuracy&#10;Implemented TF-IDF cosine similarity for job matching" oninput="liveUpdate()"></textarea></div>
                </div>
            </div>
            <button class="btn-add-entry" onclick="addProj()">+ Add Project</button>
        </div>

        <div class="f-block">
            <div class="f-block-title">⚡ Skills</div>
            <div class="f-row">
                <div class="f-group"><label>Programming Languages</label><input type="text" id="sk_lang" placeholder="Python, Java, JavaScript, C++" oninput="liveUpdate()"></div>
                <div class="f-group"><label>Frameworks & Libraries</label><input type="text" id="sk_fw" placeholder="React, Node.js, Django, Flask" oninput="liveUpdate()"></div>
            </div>
            <div class="f-row">
                <div class="f-group"><label>Databases</label><input type="text" id="sk_db" placeholder="MySQL, MongoDB, PostgreSQL" oninput="liveUpdate()"></div>
                <div class="f-group"><label>Tools & Platforms</label><input type="text" id="sk_tools" placeholder="Git, Docker, AWS, Linux" oninput="liveUpdate()"></div>
            </div>
        </div>

        <div class="f-block">
            <div class="f-block-title">🏆 Certifications</div>
            <div id="cert-wrap">
                <div class="entry-block">
                    <div class="entry-hdr"><span class="entry-lbl">Cert #1</span><button class="btn-rm" onclick="removeBlock(this)">✕ Remove</button></div>
                    <div class="f-row"><div class="f-group"><label>Certificate Name</label><input type="text" class="cert-nm" placeholder="AWS Cloud Practitioner" oninput="liveUpdate()"></div><div class="f-group"><label>Issuer & Year</label><input type="text" class="cert-is" placeholder="Amazon Web Services, 2024" oninput="liveUpdate()"></div></div>
                </div>
            </div>
            <button class="btn-add-entry" onclick="addCert()">+ Add Certification</button>
        </div>

        <div class="btn-actions">
            <button class="btn-outline-full" onclick="downloadPDF()">⬇ Download PDF</button>
            <button class="btn-gold-full" onclick="window.print()">🖨️ Print Resume</button>
        </div>

    </div>

    <!-- PREVIEW COLUMN -->
    <div class="preview-col">
        <div class="preview-header">
            <span class="preview-title">Live Preview</span>
            <span style="font-size:.75rem;color:var(--text2)">Updates as you type</span>
        </div>
        <div class="preview-wrap">
            <iframe id="previewFrame" title="Resume Preview"></iframe>
        </div>
    </div>
</div>

<!-- Hidden element for PDF export -->
<div id="pdfTarget" style="display:none;position:absolute;left:-9999px;top:0;width:210mm;background:#fff;"></div>

<script>
function g(id) { var e=document.getElementById(id); return e?e.value.trim():''; }

function buildHTML() {
    var name=g('f_name')||'Your Name', title=g('f_title'), email=g('f_email'), phone=g('f_phone'), linkedin=g('f_linkedin'), github=g('f_github'), summary=g('f_summary');
    var skLang=g('sk_lang'), skFw=g('sk_fw'), skDb=g('sk_db'), skTools=g('sk_tools');

    var eduH=''; document.querySelectorAll('#edu-wrap .entry-block').forEach(function(b){
        var d=b.querySelector('.edu-deg').value.trim(), u=b.querySelector('.edu-uni').value.trim(), y=b.querySelector('.edu-yr').value.trim(), gpa=b.querySelector('.edu-gpa').value.trim();
        if(!d&&!u) return;
        eduH+='<div class="sec-entry"><div class="entry-title">'+(d||'Degree')+'</div><div class="entry-meta">'+(u||'')+' '+(y?'| '+y:'')+(gpa?' | CGPA: '+gpa:'')+'</div></div>';
    });

    var expH=''; document.querySelectorAll('#exp-wrap .entry-block').forEach(function(b){
        var t=b.querySelector('.exp-ttl').value.trim(), co=b.querySelector('.exp-co').value.trim(), dur=b.querySelector('.exp-dur').value.trim(), pts=b.querySelector('.exp-pts').value.trim();
        if(!t&&!co) return;
        var buls=pts?pts.split('\n').filter(function(l){return l.trim();}).map(function(l){return '<li>'+l.trim()+'</li>';}).join(''):'';
        expH+='<div class="sec-entry"><div class="entry-row"><div><span class="entry-title">'+(t||'Role')+'</span> <span class="entry-sep">·</span> <span class="entry-co">'+(co||'')+'</span></div><span class="entry-date">'+(dur||'')+'</span></div>'+(buls?'<ul>'+buls+'</ul>':'')+'</div>';
    });

    var projH=''; document.querySelectorAll('#proj-wrap .entry-block').forEach(function(b){
        var nm=b.querySelector('.prj-nm').value.trim(), tk=b.querySelector('.prj-tk').value.trim(), ds=b.querySelector('.prj-ds').value.trim();
        if(!nm) return;
        var buls=ds?ds.split('\n').filter(function(l){return l.trim();}).map(function(l){return '<li>'+l.trim()+'</li>';}).join(''):'';
        projH+='<div class="sec-entry"><div class="entry-title">'+nm+(tk?' <span class="tech">'+tk+'</span>':'')+'</div>'+(buls?'<ul>'+buls+'</ul>':'')+'</div>';
    });

    var certH=''; document.querySelectorAll('#cert-wrap .entry-block').forEach(function(b){
        var nm=b.querySelector('.cert-nm').value.trim(), is=b.querySelector('.cert-is').value.trim();
        if(!nm) return;
        certH+='<div class="cert-row"><span class="cert-name">'+nm+'</span>'+(is?' <span class="cert-org">— '+is+'</span>':'')+'</div>';
    });

    var skillH='';
    if(skLang) skillH+='<div class="sk-row"><span class="sk-lbl">Languages</span><span>'+skLang+'</span></div>';
    if(skFw)   skillH+='<div class="sk-row"><span class="sk-lbl">Frameworks</span><span>'+skFw+'</span></div>';
    if(skDb)   skillH+='<div class="sk-row"><span class="sk-lbl">Databases</span><span>'+skDb+'</span></div>';
    if(skTools) skillH+='<div class="sk-row"><span class="sk-lbl">Tools</span><span>'+skTools+'</span></div>';

    return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Georgia',serif;font-size:10.5px;color:#1c1c2e;padding:28px 36px;line-height:1.55;}
.name{font-size:22px;font-weight:700;color:#0f172a;letter-spacing:.3px;}
.job-title{font-size:12px;color:#4338ca;font-weight:600;margin-top:2px;}
.contact{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:9.5px;color:#64748b;padding-bottom:12px;border-bottom:2px solid #0f172a;}
.sec-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#0f172a;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #e2e8f0;}
.sec-entry{margin-bottom:9px;}
.entry-title{font-weight:700;font-size:11px;color:#0f172a;}
.entry-meta{font-size:9px;color:#64748b;margin-top:2px;}
.entry-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.entry-sep{color:#94a3b8;margin:0 4px;}
.entry-co{color:#4338ca;font-weight:600;font-size:10.5px;}
.entry-date{font-size:9px;color:#94a3b8;white-space:nowrap;}
ul{padding-left:14px;margin-top:3px;}
li{font-size:10px;margin-bottom:2.5px;color:#334155;}
.tech{font-size:8.5px;background:#f1f5f9;padding:2px 7px;border-radius:4px;color:#64748b;font-weight:400;margin-left:5px;}
.sk-row{display:flex;gap:6px;margin-bottom:4px;font-size:10px;}
.sk-lbl{font-weight:700;color:#0f172a;min-width:72px;}
.cert-row{font-size:10px;margin-bottom:4px;}
.cert-name{font-weight:600;}
.cert-org{color:#64748b;}
.summary-p{font-size:10px;color:#334155;line-height:1.65;}
</style></head><body>
<div class="name">${name}</div>
${title?'<div class="job-title">'+title+'</div>':''}
<div class="contact">
${email?'<span>✉ '+email+'</span>':''}
${phone?'<span>📞 '+phone+'</span>':''}
${linkedin?'<span>🔗 '+linkedin+'</span>':''}
${github?'<span>💻 '+github+'</span>':''}
</div>
${summary?'<div class="sec-title">Summary</div><p class="summary-p">'+summary+'</p>':''}
${eduH?'<div class="sec-title">Education</div>'+eduH:''}
${expH?'<div class="sec-title">Experience</div>'+expH:''}
${projH?'<div class="sec-title">Projects</div>'+projH:''}
${skillH?'<div class="sec-title">Skills</div>'+skillH:''}
${certH?'<div class="sec-title">Certifications</div>'+certH:''}
</body></html>`;
}

function liveUpdate() {
    var f=document.getElementById('previewFrame');
    var doc=f.contentDocument||f.contentWindow.document;
    doc.open(); doc.write(buildHTML()); doc.close();
}

function downloadPDF() {
    var name = g('f_name') || 'resume';
    var pdfDiv = document.getElementById('pdfTarget');
    pdfDiv.style.display = 'block';

    // Build clean HTML for PDF
    var html = buildHTML();
    // Extract just the body content
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    var bodyContent = tmp.querySelector('body') ? tmp.querySelector('body').innerHTML : html;

    pdfDiv.innerHTML = '<style>*{margin:0;padding:0;box-sizing:border-box;}body,div{font-family:Georgia,serif;font-size:10.5px;color:#1c1c2e;line-height:1.55;}.name{font-size:22px;font-weight:700;color:#0f172a;}.job-title{font-size:12px;color:#4338ca;font-weight:600;margin-top:2px;}.contact{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:9.5px;color:#64748b;padding-bottom:12px;border-bottom:2px solid #0f172a;}.sec-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#0f172a;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #e2e8f0;}.sec-entry{margin-bottom:9px;}.entry-title{font-weight:700;font-size:11px;color:#0f172a;}.entry-meta{font-size:9px;color:#64748b;margin-top:2px;}.entry-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}.entry-sep{color:#94a3b8;margin:0 4px;}.entry-co{color:#4338ca;font-weight:600;font-size:10.5px;}.entry-date{font-size:9px;color:#94a3b8;white-space:nowrap;}ul{padding-left:14px;margin-top:3px;}li{font-size:10px;margin-bottom:2.5px;color:#334155;}.tech{font-size:8.5px;background:#f1f5f9;padding:2px 7px;border-radius:4px;color:#64748b;margin-left:5px;}.sk-row{display:flex;gap:6px;margin-bottom:4px;font-size:10px;}.sk-lbl{font-weight:700;color:#0f172a;min-width:72px;}.cert-row{font-size:10px;margin-bottom:4px;}.cert-name{font-weight:600;}.cert-org{color:#64748b;}.summary-p{font-size:10px;color:#334155;line-height:1.65;}</style>' + bodyContent;

    var opt = {
        margin: [12, 14, 12, 14],
        filename: name.replace(/\s+/g, '_') + '_Resume.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(pdfDiv).save().then(function() {
        pdfDiv.style.display = 'none';
        pdfDiv.innerHTML = '';
    });
}

function removeBlock(btn) { btn.closest('.entry-block').remove(); liveUpdate(); }

function addBlock(wrapId, label, html) {
    var w=document.getElementById(wrapId);
    var cnt=w.querySelectorAll('.entry-block').length+1;
    var d=document.createElement('div'); d.className='entry-block';
    d.innerHTML='<div class="entry-hdr"><span class="entry-lbl">'+label+' #'+cnt+'</span><button class="btn-rm" onclick="removeBlock(this)">✕ Remove</button></div>'+html;
    w.appendChild(d);
    d.querySelectorAll('input,textarea').forEach(function(el){ el.addEventListener('input',liveUpdate); });
    liveUpdate();
}

function addEdu() {
    addBlock('edu-wrap','Education','<div class="f-row"><div class="f-group"><label>Degree</label><input type="text" class="edu-deg" placeholder="B.Tech Computer Science"></div><div class="f-group"><label>University</label><input type="text" class="edu-uni" placeholder="XYZ University"></div></div><div class="f-row"><div class="f-group"><label>Year</label><input type="text" class="edu-yr" placeholder="2021 – 2025"></div><div class="f-group"><label>CGPA</label><input type="text" class="edu-gpa" placeholder="8.5 / 10"></div></div>');
}
function addExp() {
